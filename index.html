<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neural Network Playground (Dark Material)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="md-app-bar">
    <h1>Neural Network Playground</h1>
    <div class="epoch-loss-panel">
      <span id="epochCounter">Epoch: 000000</span>
      <span>Loss:</span>
      <span id="trainingLoss" class="train-loss">0.000</span>
      <span id="testLoss" class="test-loss">0.000</span>
    </div>
  </header>
  <div id="errorMessage" style="display:none;color:#cf6679;background:#222;padding:8px 16px;margin:8px 0;border-radius:4px;"></div>

  <main class="main-layout">
    <!-- Left Sidebar: Controls -->
    <div class="sidebar-wrapper">
      <aside class="sidebar">
      <section class="md-card panel" id="data-panel">
        <h2>DATA</h2>
        <div class="dataset-controls">
          <label>Dataset</label>
          <div class="btn-group dataset-group">
            <button class="md-btn dataset-option" data-dataset="circle">Circle</button>
            <button class="md-btn dataset-option active" data-dataset="spiral">Spiral</button>
            <button class="md-btn dataset-option" data-dataset="xor">XOR</button>
            <button class="md-btn dataset-option" data-dataset="gaussian">Gaussian</button>
          </div>
        </div>
        <div class="slider-control">
          <label for="ratioSlider">Train/Test Split (%)</label>
          <input type="range" id="ratioSlider" min="10" max="90" value="60"/>
          <span id="ratioValue">60%</span>
        </div>
        <div class="slider-control">
          <label for="noiseSlider">Noise</label>
          <input type="range" id="noiseSlider" min="0" max="50" value="0"/>
          <span id="noiseValue">0</span>
        </div>
        <button class="md-btn" id="regenerateBtn">REGENERATE</button>
        <label class="md-checkbox">
          <input type="checkbox" id="showTestData"/>
          Show Test Data
        </label>
      </section>

      <section class="md-card panel" id="features-panel">
        <h2>FEATURES</h2>
        <div class="feature-checkboxes">
          <label><input type="checkbox" id="feature-x1" checked/> X₁</label>
          <label><input type="checkbox" id="feature-x2" checked/> X₂</label>
          <label><input type="checkbox" id="feature-x1sq"/> X₁²</label>
          <label><input type="checkbox" id="feature-x2sq"/> X₂²</label>
          <label><input type="checkbox" id="feature-x1x2"/> X₁X₂</label>
          <label><input type="checkbox" id="feature-sinx1"/> sin(X₁)</label>
          <label><input type="checkbox" id="feature-sinx2"/> sin(X₂)</label>
        </div>
      </section>

      <section class="md-card panel" id="network-panel">
        <h2>NETWORK CONFIGURATION</h2>
        <div class="network-config">
          <div>
            <label>Hidden Layers</label>
            <button class="md-btn" id="removeLayerBtn">-</button>
            <span id="layerCountDisplay">3 HIDDEN LAYERS</span>
            <button class="md-btn" id="addLayerBtn">+</button>
          </div>
          <div>
            <label for="neuronCountSlider">Neurons Per Layer</label>
            <input type="range" id="neuronCountSlider" min="1" max="32" value="7"/>
            <input type="number" id="neuronCountInput" min="1" max="32" value="7"/>
          </div>
          <div>
            <label for="activationSelect">Activation</label>
            <select id="activationSelect">
              <option value="relu">ReLU</option>
              <option value="tanh">Tanh</option>
              <option value="sigmoid">Sigmoid</option>
            </select>
          </div>
          <div>
            <label for="learningRateSelect">Learning rate</label>
            <select id="learningRateSelect">
              <option value="0.03">0.03</option>
              <option value="0.01" selected>0.01</option>
              <option value="0.003">0.003</option>
              <option value="0.001">0.001</option>
            </select>
          </div>
          <div>
            <label for="regularizationSelect">Regularization</label>
            <select id="regularizationSelect">
              <option value="none">None</option>
              <option value="l1">L1</option>
              <option value="l2">L2</option>
            </select>
          </div>
          <div>
            <label for="regularizationRateSelect">Regularization Rate</label>
            <select id="regularizationRateSelect">
              <option value="0">0</option>
              <option value="0.001">0.001</option>
              <option value="0.003">0.003</option>
              <option value="0.01">0.01</option>
              <option value="0.03">0.03</option>
              <option value="0.1">0.1</option>
            </select>
          </div>
          <div>
            <label for="batchSizeSlider">Batch Size</label>
            <input type="range" id="batchSizeSlider" min="1" max="100" value="30"/>
            <span id="batchSizeValue">30</span>
          </div>
          <label class="md-checkbox">
            <input type="checkbox" id="discretizeOutput"/>
            Discretize Output
          </label>
        </div>
      </section>
      </aside>
    </div>

    <!-- Main Visualization Area -->
    <section class="main-visualization">
      <div class="controls-bar">
        <button class="md-btn" id="playBtn">▶</button>
        <button class="md-btn" id="stepBtn">Step</button>
        <button class="md-btn" id="resetBtn">Reset</button>
      </div>
      <div class="network-visualization">
        <div id="network-container"></div>
      </div>
      <div class="output-panel">
        <div id="decision-boundary-container"></div>
        <!-- Additional output info/legend can go here -->
      </div>
    </section>
  </main>

  <!-- Main application script as module -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
