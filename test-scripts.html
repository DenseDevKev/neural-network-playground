<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Scripts</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .success {
      color: green;
      font-weight: bold;
    }
    .error {
      color: red;
      font-weight: bold;
    }
    pre {
      background-color: #f5f5f5;
      padding: 10px;
      border-radius: 5px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <h1>Testing Script Loading</h1>
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');
    
    function log(message, isError = false) {
      const div = document.createElement('div');
      div.className = isError ? 'error' : 'success';
      div.textContent = message;
      results.appendChild(div);
      console.log(message);
    }
    
    function logObject(label, obj) {
      const div = document.createElement('div');
      div.textContent = label;
      results.appendChild(div);
      
      const pre = document.createElement('pre');
      pre.textContent = JSON.stringify(obj, null, 2);
      results.appendChild(pre);
    }
    
    window.addEventListener('error', function(event) {
      log(`Error: ${event.message} in ${event.filename} at line ${event.lineno}`, true);
    });
    
    // Test each script individually
    function testScript(src, callback) {
      const script = document.createElement('script');
      script.src = src;
      script.onload = function() {
        log(`✓ Successfully loaded: ${src}`);
        if (callback) callback();
      };
      script.onerror = function() {
        log(`✗ Failed to load: ${src}`, true);
      };
      document.body.appendChild(script);
    }
    
    // Load scripts in sequence
    testScript('lib/d3.min.js', function() {
      log('d3 version: ' + (window.d3 ? d3.version : 'undefined'));
      
      testScript('lib/tf.min.js', function() {
        log('TensorFlow.js version: ' + (window.tf ? tf.version.tfjs : 'undefined'));
        
        testScript('js/data-generator.js', function() {
          log('DataGenerator available: ' + (typeof DataGenerator !== 'undefined'));
          log('dataGenerator instance available: ' + (typeof dataGenerator !== 'undefined'));
          
          if (typeof dataGenerator !== 'undefined') {
            log('Enabled features: ' + dataGenerator.getEnabledFeatureCount());
            log('Feature names: ' + dataGenerator.getEnabledFeatureNames().join(', '));
          }
          
          testScript('js/visualization.js', function() {
            log('window.nn_vis available: ' + (typeof window.nn_vis !== 'undefined'));
            
            if (typeof window.nn_vis !== 'undefined') {
              log('Available methods: ' + Object.keys(window.nn_vis).join(', '));
            }
            
            testScript('js/main.js', function() {
              log('All scripts loaded successfully');
            });
          });
        });
      });
    });
  </script>
</body>
</html>
